name: Build Release

on:
  push:
    tags: [ "v[0-9]+.[0-9]+.[0-9]+" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          path: ${{ github.event.repository.name }}

      - name: Check manifest version matches tag
        run: |
          tag_version="${{ github.ref_name }}"
          tag_version="${tag_version#v}"
          manifest_version=$(grep '^version' ${{ github.event.repository.name }}/blender_manifest.toml | sed 's/version = "\(.*\)"/\1/')
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Version mismatch: tag is '$tag_version' but blender_manifest.toml has '$manifest_version'"
            exit 1
          fi
          echo "Version check passed: $manifest_version"

      - name: Zip Repository (excludes hidden dirs, venv, tests)
        run: |
          version_with_underscores=$(echo ${{ github.ref_name }} | tr '.' '_')
          zip -r simple_renaming_${version_with_underscores}.zip \
            ${{ github.event.repository.name }} \
            -x "${{ github.event.repository.name }}/.git*" \
            -x "${{ github.event.repository.name }}/.*/*" \
            -x "${{ github.event.repository.name }}/tests/*" \
            -x "${{ github.event.repository.name }}/tools/*" \
            -x "${{ github.event.repository.name }}/venv/*"

      - name: Create versioned build with filtered zip file
        run: |
          version_with_underscores=$(echo ${{ github.ref_name }} | tr '.' '_')
          cd ${{ github.event.repository.name }}
          gh release create ${{ github.ref_name }} --generate-notes \
            ../simple_renaming_${version_with_underscores}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
